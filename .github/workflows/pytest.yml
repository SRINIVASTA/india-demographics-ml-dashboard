name: Run Pytest Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically caches dependencies to speed up future runs

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-html # Optional: installs plugin to generate visual reports

    - name: Run Test Suite with Pytest
      run: |
        python -m pytest test_app.py -v --html=report.html --self-contained-html

    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      if: always() # Ensures report uploads even if tests fail
      with:
        name: pytest-html-report
        path: report.html
