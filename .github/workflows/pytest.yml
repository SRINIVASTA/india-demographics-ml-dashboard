name: Run Pytest Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Grants the cloud server explicit permissions to publish web pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-html

    - name: Run Test Suite with Pytest Headless Context
      run: |
        python -m pytest test_app.py -v --html=index.html --self-contained-html
      env:
        STREAMLIT_RUN_HEADLESS: "true"
        STREAMLIT_BROWSER_GATHER_USAGE: "false"

    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-html-report
        path: index.html

    - name: Deploy Test Report to Live GitHub Pages Web Link
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_files: index.html
